<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peace Advocacy</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f7f8;
        text-align: center;
    }
    .container {
        max-width: 800px;
        margin: auto;
        padding: 20px;
    }
    img {
        width: 100%;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .description {
        margin: 20px 0;
        font-size: 16px;
        color: #333;
    }
    button {
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background-color: #2c6e7f;
        color: white;
        cursor: pointer;
    }
    button:hover {
        background-color: #1f4f5c;
    }
</style>
</head>
<body>

<div class="container">
    <!-- Infographic Image -->
    <img src="Peace Education.png" alt="Peace Infographic">

    <!-- Short Description -->
    <div class="description">
        This advocacy highlights that true peace is not only the absence of violence, but also the presence of justice, equality, and opportunity. It encourages global awareness and action toward building a more inclusive and peaceful world.
    </div>

    <!-- Reaction Button -->
    <button onclick="increment()">❤️ React (<span id="count">0</span>)</button>
</div>

<script>
    let count = 0;
    function increment() {
        count++;
        document.getElementById("count").innerText = count;
    }
</script>

</body>
</html>
